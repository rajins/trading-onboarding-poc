version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onboarding
      POSTGRES_USER: onboarding
      POSTGRES_PASSWORD: onboarding
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onboarding"]
      interval: 5s
      timeout: 5s
      retries: 5

  orchestrator:
    build: ./apps/orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-3001}:3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AUDIT_DB_PATH=/data/audit.db
      - DATABASE_URL=postgresql://onboarding:onboarding@postgres:5432/onboarding
    volumes:
      - audit-data:/data
      - ./rules:/app/rules
      - ./mcp-servers:/app/mcp-servers
    depends_on:
      postgres:
        condition: service_healthy
      audit-server:
        condition: service_started
      product-eligibility-server:
        condition: service_started
      kyc-server:
        condition: service_started
      suitability-server:
        condition: service_started
      disclosure-server:
        condition: service_started

  audit-server:
    build: ./mcp-servers/audit-server
    volumes:
      - audit-data:/data
    environment:
      - AUDIT_DB_PATH=/data/audit.db

  product-eligibility-server:
    build: ./mcp-servers/product-eligibility-server
    volumes:
      - ./rules:/app/rules

  kyc-server:
    build: ./mcp-servers/kyc-server
    volumes:
      - ./rules:/app/rules

  suitability-server:
    build: ./mcp-servers/suitability-server
    volumes:
      - ./rules:/app/rules

  disclosure-server:
    build: ./mcp-servers/disclosure-server
    volumes:
      - ./rules:/app/rules

  frontend:
    build: ./apps/frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:${ORCHESTRATOR_PORT:-3001}
    depends_on:
      - orchestrator

volumes:
  audit-data:
  postgres-data:
