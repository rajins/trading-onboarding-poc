services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onboarding_sessions
      POSTGRES_USER: onboarding
      POSTGRES_PASSWORD: onboarding
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onboarding"]
      interval: 5s
      timeout: 5s
      retries: 5

  orchestrator:
    build: ./apps/orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-3001}:3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SESSIONS_DATABASE_URL=postgresql://onboarding:onboarding@postgres:5432/onboarding_sessions
      - AUDIT_DATABASE_URL=postgresql://onboarding:onboarding@postgres:5432/onboarding_audit
      - PII_DATABASE_URL=postgresql://onboarding:onboarding@postgres:5432/onboarding_pii
      - PERSONAL_DETAILS_ENCRYPTION_KEY=${PERSONAL_DETAILS_ENCRYPTION_KEY}
    volumes:
      - ./rules:/app/rules
      - ./mcp-servers:/app/mcp-servers
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./apps/frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:${ORCHESTRATOR_PORT:-3001}
    depends_on:
      - orchestrator

volumes:
  postgres-data:
